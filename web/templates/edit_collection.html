{% extends "base.html" %}

{% block title %}
Edit {{ collection["name"] }} — ShangooliOS
{% endblock %}

{% block content %}

<div class="mb-4">
    <a
        href="/collections/{{ collection['code'] }}"
        class="text-decoration-none"
    >
        ← Back to {{ collection["name"] }}
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h1 class="h3 mb-1">Edit Collection</h1>
                <p class="text-muted mb-4">
                    {{ collection["code"] }}
                </p>

                <form
                    method="post"
                    action="/collections/{{ collection['code'] }}/edit"
                >
                    <div class="mb-3">
                        <label for="name" class="form-label">
                            Collection Name
                        </label>
                        <input
                            id="name"
                            name="name"
                            type="text"
                            class="form-control"
                            value="{{ collection['name'] }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label
                            for="target_artwork_count"
                            class="form-label"
                        >
                            Target Artwork Count
                        </label>
                        <input
                            id="target_artwork_count"
                            name="target_artwork_count"
                            type="number"
                            class="form-control"
                            min="0"
                            value="{{ collection['target_artwork_count'] or 0 }}"
                        >
                    </div>

                    <div class="mb-4">
                        <label
                            for="collection_status"
                            class="form-label"
                        >
                            Status
                        </label>
                        <select
                            id="collection_status"
                            name="collection_status"
                            class="form-select"
                        >
                            {% for option in [
                                "planned",
                                "active",
                                "complete",
                                "paused"
                            ] %}
                            <option
                                value="{{ option }}"
                                {% if collection["status"] == option %}selected{% endif %}
                            >
                                {{ option }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a
                            href="/collections/{{ collection['code'] }}"
                            class="btn btn-outline-secondary"
                        >
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Save Collection
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
