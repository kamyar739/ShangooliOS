{% extends "base.html" %}

{% block title %}
New Artwork — ShangooliOS
{% endblock %}

{% block content %}

<div class="mb-4">
    <a
        href="/collections/{{ collection['code'] }}"
        class="context-nav-link"
    >
        <span aria-hidden="true">←</span> Back to {{ collection["name"] }}
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h1 class="h3 mb-1">New Artwork</h1>
                <p class="text-muted mb-4">
                    {{ collection["name"] }}
                </p>

                <form
                    method="post"
                    action="/collections/{{ collection['code'] }}/new"
                >
                    <div class="mb-3">
                        <label for="public_title" class="form-label">
                            Public Title
                        </label>
                        <input
                            id="public_title"
                            name="public_title"
                            type="text"
                            class="form-control"
                            required
                            autofocus
                        >
                    </div>

                    <div class="mb-3">
                        <label for="working_title" class="form-label">
                            Working Title
                        </label>
                        <input
                            id="working_title"
                            name="working_title"
                            type="text"
                            class="form-control"
                        >
                    </div>

                    <div class="mb-4">
                        <label for="theme" class="form-label">
                            Theme
                        </label>
                        <input
                            id="theme"
                            name="theme"
                            type="text"
                            class="form-control"
                        >
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a
                            href="/collections/{{ collection['code'] }}"
                            class="btn btn-outline-secondary"
                        >
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Create Artwork
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
