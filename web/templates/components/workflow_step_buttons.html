<nav class="workflow-step-buttons" aria-label="Artwork workflow steps">
  {% for stage in workflow_nav['stages'] %}
  <a href="{{ stage['href'] }}" data-workflow-link="{{ stage['key'] }}" data-workflow-state="{{ stage['state'] }}" class="workflow-step-button state-{{ stage['state'] }} {% if stage['key'] == workflow_nav['active_stage'] %}is-current{% endif %}"{% if stage['key'] == workflow_nav['active_stage'] %} aria-current="step"{% endif %}>
    <span class="workflow-stage-icon">{% if stage['state'] in ['complete', 'published'] %}✓{% elif stage['state'] in ['needs_review', 'out_of_date', 'unpublished_changes'] %}!{% else %}{{ loop.index }}{% endif %}</span>
    <span class="workflow-step-copy"><strong>{{ stage['label'] }}</strong><small>{{ stage['state_label'] }}</small></span>
  </a>
  {% endfor %}
</nav>
