<div class="sidebar-masthead">
  <a class="sidebar-brand" href="/">ShangooliOS</a>
  <form class="sidebar-search" method="get" action="/search">
    <label class="visually-hidden" for="sidebar-search-{{ sidebar_search_id|default('workflow') }}">Search artworks</label>
    <span class="sidebar-search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-4-4"></path>
      </svg>
    </span>
    <input id="sidebar-search-{{ sidebar_search_id|default('workflow') }}" type="search" name="q" placeholder="Search artworks…">
    <button type="submit" aria-label="Search artworks" title="Search artworks">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="m9 18 6-6-6-6"></path>
      </svg>
    </button>
  </form>
</div>
