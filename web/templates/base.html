<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}ShangooliOS{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="{{ url_for('static', path='style.css') }}"
        rel="stylesheet"
    >
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">ShangooliOS</a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavigation">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="/">Dashboard</a>
                    <a class="nav-link" href="/#collections">Collections</a>
                    <a class="nav-link" href="/listings">Listings</a>
                    <a class="nav-link" href="/etsy/connect">Etsy connection</a>
                </div>

                <form class="d-flex" method="get" action="/search">
                    <input
                        class="form-control form-control-sm me-2"
                        type="search"
                        name="q"
                        placeholder="Search artworks"
                        aria-label="Search artworks"
                    >
                    <button class="btn btn-sm btn-outline-light" type="submit">
                        Search
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="container pb-4 text-center text-muted small">
        ShangooliShop · ShangooliOS
    </footer>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
