<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}ShangooliOS{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="{{ url_for('static', path='style.css') }}?v=20260719-workflow-18"
        rel="stylesheet"
    >
</head>

<body>
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="container pb-4 text-center text-muted small">
        ShangooliShop · ShangooliOS
    </footer>

    <div class="app-wait-overlay" data-app-wait hidden role="status" aria-live="polite" aria-label="Please wait">
        <div class="app-wait-card">
            <div class="app-wait-spinner" aria-hidden="true"><span>S</span></div>
            <strong data-app-wait-message>Working…</strong>
            <small>Please keep this page open.</small>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script>
    (function () {
      const overlay = document.querySelector('[data-app-wait]');
      const message = overlay && overlay.querySelector('[data-app-wait-message]');
      let timer;
      function showWait(label) {
        clearTimeout(timer);
        timer = setTimeout(() => {
          if (message) message.textContent = label || 'Working…';
          overlay.hidden = false;
          document.body.classList.add('is-waiting');
        }, 180);
      }
      window.showAppWait = showWait;
      document.addEventListener('submit', (event) => {
        if (event.defaultPrevented || !event.target.checkValidity()) return;
        const action = event.target.action || '';
        if (action.includes('/export') || action.includes('printify-export')) return;
        const submitter = event.submitter;
        showWait(submitter && submitter.textContent.trim() ? submitter.textContent.trim() + '…' : 'Saving…');
      });
      document.addEventListener('click', (event) => {
        const link = event.target.closest('a[href]');
        if (!link || link.target === '_blank' || link.hasAttribute('download')) return;
        setTimeout(() => {
          if (event.defaultPrevented) return;
          const destination = new URL(link.href, window.location.href);
          if (destination.origin !== window.location.origin) return;
          if (destination.pathname === window.location.pathname && destination.search === window.location.search && destination.hash) return;
          showWait('Loading…');
        }, 0);
      });
      document.addEventListener('change', (event) => {
        const control = event.target;
        if (control.matches('[onchange*="form.submit"]')) showWait('Uploading…');
      });
      window.addEventListener('pageshow', () => {
        clearTimeout(timer);
        overlay.hidden = true;
        document.body.classList.remove('is-waiting');
      });
    })();
    </script>
</body>
</html>
