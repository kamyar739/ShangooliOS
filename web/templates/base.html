<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}ShangooliOS{% endblock %}</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', path='shangoolishop-logo.jpg') }}">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="{{ url_for('static', path='style.css') }}?v=20260721-mockup-studio-phase2-1"
        rel="stylesheet"
    >
</head>

<body>
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="container pb-4 text-center text-muted small">
        <a class="footer-shop-link" href="https://www.etsy.com/shop/ShangooliShop" target="_blank" rel="noopener noreferrer">ShangooliShop on Etsy ↗</a> · ShangooliOS
    </footer>

    <div class="app-wait-overlay" data-app-wait hidden role="status" aria-live="polite" aria-label="Please wait">
        <div class="app-wait-card">
            <div class="app-wait-spinner" aria-hidden="true"><span>S</span></div>
            <strong data-app-wait-message>Working…</strong>
            <small>Please keep this page open.</small>
        </div>
    </div>

    <div class="artwork-context-menu" data-artwork-menu hidden role="menu" aria-label="Change artwork status">
        <div class="artwork-context-heading"><strong data-artwork-menu-title>Artwork</strong><small>Change status</small></div>
        <form method="post" data-artwork-status-form>
            <input type="hidden" name="return_to" data-artwork-return-to>
            {% for option in ["idea", "creating", "review", "approved", "production", "paused", "retired"] %}
            <button type="submit" name="status" value="{{ option }}" role="menuitem" data-artwork-status-option="{{ option }}"><span class="status-dot status-{{ option }}"></span>{{ option|title }}</button>
            {% endfor %}
            <button type="button" disabled data-artwork-status-option="listed" title="Listed status is controlled by Etsy"><span class="status-dot status-approved"></span>Listed <small>via Etsy</small></button>
        </form>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script>
    (function () {
      const overlay = document.querySelector('[data-app-wait]');
      const message = overlay && overlay.querySelector('[data-app-wait-message]');
      let timer;
      function revealWait(label) {
        if (message) message.textContent = label || 'Working…';
        overlay.hidden = false;
        document.body.classList.add('is-waiting');
      }
      function hideWait() {
        clearTimeout(timer);
        overlay.hidden = true;
        document.body.classList.remove('is-waiting');
      }
      function showWait(label, immediate) {
        clearTimeout(timer);
        if (immediate) {
          revealWait(label);
          return;
        }
        timer = setTimeout(() => {
          revealWait(label);
        }, 180);
      }
      window.showAppWait = showWait;
      document.addEventListener('submit', (event) => {
        if (event.defaultPrevented || !event.target.checkValidity()) return;
        const action = event.target.action || '';
        if (action.includes('/export') || action.includes('printify-export')) return;
        const submitter = event.submitter;
        const label = submitter && submitter.textContent.trim() ? submitter.textContent.trim() + '…' : 'Saving…';
        if (event.target.matches('[data-long-operation]')) {
          event.preventDefault();
          showWait(label, true);
          if (submitter) submitter.disabled = true;
          fetch(event.target.action, {
            method: (event.target.method || 'POST').toUpperCase(),
            body: new FormData(event.target),
            redirect: 'follow'
          }).then(async (response) => {
            if (!response.ok) {
              let detail = 'The operation could not be completed.';
              try { detail = (await response.json()).detail || detail; } catch (_) {}
              throw new Error(detail);
            }
            window.location.assign(response.url);
          }).catch((error) => {
            hideWait();
            if (submitter) submitter.disabled = false;
            window.alert(error.message);
          });
          return;
        }
        showWait(label);
      });
      document.addEventListener('click', (event) => {
        const link = event.target.closest('a[href]');
        if (!link || link.target === '_blank' || link.hasAttribute('download')) return;
        setTimeout(() => {
          if (event.defaultPrevented) return;
          const destination = new URL(link.href, window.location.href);
          if (destination.origin !== window.location.origin) return;
          if (destination.pathname === window.location.pathname && destination.search === window.location.search && destination.hash) return;
          showWait('Loading…');
        }, 0);
      });
      document.addEventListener('change', (event) => {
        const control = event.target;
        if (control.matches('[onchange*="form.submit"]')) showWait('Uploading…');
      });
      window.addEventListener('pageshow', () => {
        hideWait();
      });

      const artworkMenu = document.querySelector('[data-artwork-menu]');
      if (artworkMenu) {
        const statusForm = artworkMenu.querySelector('[data-artwork-status-form]');
        const title = artworkMenu.querySelector('[data-artwork-menu-title]');
        const returnTo = artworkMenu.querySelector('[data-artwork-return-to]');
        const closeArtworkMenu = () => { artworkMenu.hidden = true; };

        document.addEventListener('contextmenu', (event) => {
          const card = event.target.closest('[data-artwork-context-menu]');
          if (!card) return;
          event.preventDefault();
          const code = card.dataset.artworkCode;
          statusForm.action = `/artworks/${encodeURIComponent(code)}/status`;
          returnTo.value = window.location.pathname + window.location.search;
          title.textContent = card.dataset.artworkTitle || code;
          artworkMenu.querySelectorAll('[data-artwork-status-option]').forEach((button) => {
            button.classList.toggle('is-current', button.dataset.artworkStatusOption === card.dataset.artworkStatus);
          });
          artworkMenu.hidden = false;
          const maxLeft = window.innerWidth - artworkMenu.offsetWidth - 12;
          const maxTop = window.innerHeight - artworkMenu.offsetHeight - 12;
          artworkMenu.style.left = `${Math.max(12, Math.min(event.clientX, maxLeft))}px`;
          artworkMenu.style.top = `${Math.max(12, Math.min(event.clientY, maxTop))}px`;
        });
        document.addEventListener('click', (event) => {
          if (!artworkMenu.contains(event.target)) closeArtworkMenu();
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') closeArtworkMenu();
        });
        window.addEventListener('scroll', closeArtworkMenu, true);
      }
    })();
    </script>
</body>
</html>
