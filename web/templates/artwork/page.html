{% extends "base.html" %}
{% block title %}{{ artwork["artwork_code"] }} — ShangooliOS{% endblock %}
{% block content %}
<div class="workflow-shell">
  {% include "components/workflow_sidebar.html" %}
  <div class="workflow-stage-content" data-workflow-controller>
    {% include "artwork/header.html" %}
    <div class="workflow-task-heading">
      <div class="eyebrow" data-workflow-step-label></div>
      <h2 class="h3 mb-1" data-workflow-step-title></h2>
      <p class="text-muted mb-0" data-workflow-step-description></p>
    </div>
    {% include "artwork_sections.html" %}
    {% include "artwork/dashboard.html" %}
    <div class="workflow-stage-controls">
      <button type="button" class="btn btn-outline-secondary" data-workflow-previous>← Previous</button>
      <span class="small text-muted" data-workflow-position></span>
      <button type="button" class="btn btn-primary" data-workflow-next>Continue →</button>
    </div>
  </div>
</div>
<script>
(function () {
  const controller = document.querySelector('[data-workflow-controller]');
  if (!controller) return;
  const stages = ['details', 'source', 'print', 'mockups', 'listing'];
  const panels = Array.from(controller.querySelectorAll('[data-workflow-stage]'));
  const links = Array.from(document.querySelectorAll('[data-workflow-link]'));
  const previous = controller.querySelector('[data-workflow-previous]');
  const next = controller.querySelector('[data-workflow-next]');
  const position = controller.querySelector('[data-workflow-position]');
  const stepLabel = controller.querySelector('[data-workflow-step-label]');
  const stepTitle = controller.querySelector('[data-workflow-step-title]');
  const stepDescription = controller.querySelector('[data-workflow-step-description]');
  const stageCopy = {
    details: ['Step 1', 'Artwork details', 'Review the artwork identity and reusable creative context.'],
    source: ['Step 2', 'Source artwork', 'Upload the original artwork. It becomes the print-ready file automatically unless you replace it.'],
    print: ['Step 3', 'Print production', 'Confirm orientation and review the generated print ratios.'],
    mockups: ['Step 4', 'Listing images', 'Create, review, and order the images customers will see.'],
    listing: ['Step 5', 'Listing & SEO', 'Prepare the marketplace title, description, tags, and listing record.']
  };

  function showStage(key, updateHash) {
    if (!stages.includes(key)) key = 'details';
    panels.forEach((panel) => panel.hidden = panel.dataset.workflowStage !== key);
    links.forEach((link) => link.classList.toggle('is-current', link.dataset.workflowLink === key));
    const index = stages.indexOf(key);
    [stepLabel.textContent, stepTitle.textContent, stepDescription.textContent] = stageCopy[key];
    previous.disabled = index === 0;
    next.textContent = index === stages.length - 1 ? 'Open listing →' : 'Continue →';
    position.textContent = `${index + 1} of ${stages.length}`;
    previous.dataset.target = stages[Math.max(0, index - 1)];
    next.dataset.target = stages[Math.min(stages.length - 1, index + 1)];
    if (updateHash) history.replaceState(null, '', `#${key}`);
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  links.forEach((link) => link.addEventListener('click', function (event) {
    const destination = new URL(link.href);
    if (destination.pathname === window.location.pathname && stages.includes(destination.hash.slice(1))) {
      event.preventDefault();
      showStage(destination.hash.slice(1), true);
    }
  }));
  previous.addEventListener('click', () => showStage(previous.dataset.target, true));
  next.addEventListener('click', () => {
    if (next.dataset.target === 'listing' && location.hash === '#listing') {
      const listingLink = links.find((link) => link.dataset.workflowLink === 'listing');
      if (listingLink && new URL(listingLink.href).pathname !== location.pathname) location.href = listingLink.href;
      return;
    }
    showStage(next.dataset.target, true);
  });
  showStage(location.hash.slice(1) || 'details', false);
})();
</script>
{% endblock %}
